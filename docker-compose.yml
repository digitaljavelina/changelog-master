services:
  changelog-master:
    build:
      context: .
      args:
        - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
    container_name: changelog
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - changelog-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - homelab-network

volumes:
  changelog-data:

networks:
  homelab-network:
    external: true
